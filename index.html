```html
<!DOCTYPE html>
<html>
<head>
<title>Saved Notes</title>

<style>
body{
  background:black;
  color:lime;
  font-family:monospace;
  text-align:center;
}

textarea{
  width:400px;
  height:200px;
  background:black;
  color:lime;
  border:1px solid lime;
}
</style>
</head>

<body>

<h1>Data Vault</h1>

<textarea id="notes"></textarea>
<br><br>

<button onclick="saveNotes()">Save</button>

<script>

const box = document.getElementById("notes");

// Load saved data when page opens
box.value = localStorage.getItem("vault") || "";

function saveNotes(){
  localStorage.setItem("vault", box.value);
  alert("Saved.");
}

</script>

</body>
</html>
```
